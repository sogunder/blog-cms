services:
  mongodb:
    image: mongo:7.0
    container_name: blog_cms_mongodb
    restart: always
    env_file:
      - ../apps/api/.env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin_pass}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-blog_db}
    ports:
      - "${MONGO_PORT:-27018}:27017"
    volumes:
      - blog_cms_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2
    container_name: blog_cms_mongo_express
    restart: always
    env_file:
      - ../apps/api/.env
    depends_on:
      - mongodb
    ports:
      - "${MONGO_EXPRESS_PORT:-8082}:3000"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-admin_pass}@mongodb:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_ENABLED: "true"
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-mongoexpress}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-mongoexpress}

volumes:
  blog_cms_data: